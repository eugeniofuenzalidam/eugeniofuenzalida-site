services:
  falkordb:
    image: falkordb/falkordb:latest
    container_name: falkordb-graphiti
    ports:
      - "6379:6379"
      - "3000:3000"
    volumes:
      - ./data:/var/lib/falkordb/data
    restart: unless-stopped
    environment:
      - FALKORDB_ARGS=MAX_QUEUED_QUERIES 100 TIMEOUT 60000
